name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and publish
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Check out tag
        uses: actions/checkout@v4

      - name: Validate release version
        shell: bash
        run: |
          set -euo pipefail

          version="${GITHUB_REF_NAME#v}"
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tags must use vMAJOR.MINOR.PATCH; got: $GITHUB_REF_NAME" >&2
            exit 1
          fi

          project_version="$({
            xcodebuild \
              -project PDock.xcodeproj \
              -scheme PDock \
              -configuration Release \
              -showBuildSettings
          } | sed -n 's/^[[:space:]]*MARKETING_VERSION = //p' | sort -u)"

          if [[ "$project_version" != "$version" ]]; then
            echo "Tag version $version does not match MARKETING_VERSION $project_version" >&2
            exit 1
          fi

          echo "VERSION=$version" >> "$GITHUB_ENV"
          echo "ARCHIVE_NAME=PDock-$version-macos-arm64.zip" >> "$GITHUB_ENV"

      - name: Build release app
        run: |
          make build \
            CONFIGURATION=Release \
            DERIVED_DATA=.build/release \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY=-

      - name: Verify release app
        shell: bash
        run: |
          set -euo pipefail

          app=.build/release/Build/Products/Release/PDock.app
          executable="$app/Contents/MacOS/PDock"
          built_version="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' "$app/Contents/Info.plist")"
          architectures="$(lipo -archs "$executable")"

          [[ "$built_version" == "$VERSION" ]]
          [[ "$architectures" == "arm64" ]]
          codesign --verify --deep --strict --verbose=2 "$app"

      - name: Package release app
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p dist
          ditto -c -k --sequesterRsrc --keepParent \
            .build/release/Build/Products/Release/PDock.app \
            "dist/$ARCHIVE_NAME"
          (
            cd dist
            shasum -a 256 "$ARCHIVE_NAME" > "$ARCHIVE_NAME.sha256"
          )

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" \
              "dist/$ARCHIVE_NAME" \
              "dist/$ARCHIVE_NAME.sha256" \
              --clobber
          else
            gh release create "$GITHUB_REF_NAME" \
              "dist/$ARCHIVE_NAME" \
              "dist/$ARCHIVE_NAME.sha256" \
              --verify-tag \
              --title "PDock $VERSION" \
              --notes "This build is ad-hoc signed and not notarized. macOS Gatekeeper may require explicit user approval before first launch." \
              --generate-notes
          fi
