name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing vMAJOR.MINOR.PATCH tag to publish
        required: true
        type: string

permissions:
  contents: write

env:
  RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
  BUILD_NUMBER: ${{ github.run_number }}

concurrency:
  group: release-${{ inputs.tag || github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and publish
    runs-on: xcode-27
    timeout-minutes: 30

    steps:
      - name: Check out tag
        uses: actions/checkout@v5
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Validate release version
        shell: bash
        run: |
          set -euo pipefail

          version="${RELEASE_TAG#v}"
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tags must use vMAJOR.MINOR.PATCH; got: $RELEASE_TAG" >&2
            exit 1
          fi

          echo "VERSION=$version" >> "$GITHUB_ENV"
          echo "ARCHIVE_NAME=PDock-$version-macos-arm64.zip" >> "$GITHUB_ENV"

      - name: Build release app
        run: |
          make build \
            CONFIGURATION=Release \
            DERIVED_DATA=.build/release \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY=- \
            MARKETING_VERSION="$VERSION" \
            CURRENT_PROJECT_VERSION="$BUILD_NUMBER"

      - name: Verify release app
        shell: bash
        run: |
          set -euo pipefail

          app=.build/release/Build/Products/Release/PDock.app
          executable="$app/Contents/MacOS/PDock"
          built_version="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' "$app/Contents/Info.plist")"
          built_number="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' "$app/Contents/Info.plist")"
          architectures="$(lipo -archs "$executable")"

          [[ "$built_version" == "$VERSION" ]]
          [[ "$built_number" == "$BUILD_NUMBER" ]]
          [[ "$architectures" == "arm64" ]]
          codesign --verify --deep --strict --verbose=2 "$app"

      - name: Package release app
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p dist
          ditto -c -k --sequesterRsrc --keepParent \
            .build/release/Build/Products/Release/PDock.app \
            "dist/$ARCHIVE_NAME"
          (
            cd dist
            shasum -a 256 "$ARCHIVE_NAME" > "$ARCHIVE_NAME.sha256"
          )

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" \
              "dist/$ARCHIVE_NAME" \
              "dist/$ARCHIVE_NAME.sha256" \
              --clobber
          else
            gh release create "$RELEASE_TAG" \
              "dist/$ARCHIVE_NAME" \
              "dist/$ARCHIVE_NAME.sha256" \
              --verify-tag \
              --title "PDock $VERSION" \
              --notes "This build is ad-hoc signed and not notarized. macOS Gatekeeper may require explicit user approval before first launch." \
              --generate-notes
          fi
