name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing vMAJOR.MINOR.PATCH tag to publish
        required: true
        type: string

permissions:
  contents: write

env:
  RELEASE_TAG: ${{ inputs.tag || github.ref_name }}

concurrency:
  group: release-${{ inputs.tag || github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and publish
    runs-on: xcode-27
    timeout-minutes: 30

    steps:
      - name: Check out tag
        uses: actions/checkout@v5
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Validate release version
        shell: bash
        run: |
          set -euo pipefail

          version="${RELEASE_TAG#v}"
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tags must use vMAJOR.MINOR.PATCH; got: $RELEASE_TAG" >&2
            exit 1
          fi

          project_version="$({
            xcodebuild \
              -project PDock.xcodeproj \
              -scheme PDock \
              -configuration Release \
              -showBuildSettings
          } | sed -n 's/^[[:space:]]*MARKETING_VERSION = //p' | sort -u)"

          if [[ "$project_version" != "$version" ]]; then
            echo "Tag version $version does not match MARKETING_VERSION $project_version" >&2
            exit 1
          fi

          echo "VERSION=$version" >> "$GITHUB_ENV"
          echo "ARCHIVE_NAME=PDock-$version-macos-arm64.zip" >> "$GITHUB_ENV"

      - name: Import Developer ID certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.CERTIFICATES_P12 }}
          p12-password: ${{ secrets.CERTIFICATES_P12_PASSWORD }}

      - name: Build release app
        run: |
          make build \
            CONFIGURATION=Release \
            DERIVED_DATA=.build/release \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            DEVELOPMENT_TEAM="${{ secrets.APPLE_TEAM_ID }}"

      - name: Verify release app
        shell: bash
        run: |
          set -euo pipefail

          app=.build/release/Build/Products/Release/PDock.app
          executable="$app/Contents/MacOS/PDock"
          built_version="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' "$app/Contents/Info.plist")"
          architectures="$(lipo -archs "$executable")"

          signature_info="$(codesign -d --verbose=4 "$app" 2>&1)"
          designated_requirement="$(codesign -d -r- "$app" 2>&1)"
          [[ "$built_version" == "$VERSION" ]]
          [[ "$architectures" == "arm64" ]]
          codesign --verify --deep --strict --verbose=2 "$app"
          grep -Fq "Authority=Developer ID Application:" <<< "$signature_info"
          grep -Fq "TeamIdentifier=${{ secrets.APPLE_TEAM_ID }}" <<< "$signature_info"
          if grep -Fq "designated => cdhash" <<< "$designated_requirement"; then
            echo "Release app has an ad-hoc identity; macOS permissions would be lost after an update." >&2
            exit 1
          fi

      - name: Notarize and staple release app
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        shell: bash
        run: |
          set -euo pipefail

          app=.build/release/Build/Products/Release/PDock.app
          submission_archive=.build/release/PDock-notarization.zip

          ditto -c -k --sequesterRsrc --keepParent "$app" "$submission_archive"
          xcrun notarytool submit "$submission_archive" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          xcrun stapler staple "$app"
          xcrun stapler validate "$app"
          spctl --assess --type execute --verbose=4 "$app"

      - name: Package release app
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p dist
          ditto -c -k --sequesterRsrc --keepParent \
            .build/release/Build/Products/Release/PDock.app \
            "dist/$ARCHIVE_NAME"
          (
            cd dist
            shasum -a 256 "$ARCHIVE_NAME" > "$ARCHIVE_NAME.sha256"
          )

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" \
              "dist/$ARCHIVE_NAME" \
              "dist/$ARCHIVE_NAME.sha256" \
              --clobber
          else
            gh release create "$RELEASE_TAG" \
              "dist/$ARCHIVE_NAME" \
              "dist/$ARCHIVE_NAME.sha256" \
              --verify-tag \
              --title "PDock $VERSION" \
              --notes "Signed with Developer ID, notarized by Apple, and stapled for offline Gatekeeper verification." \
              --generate-notes
          fi
